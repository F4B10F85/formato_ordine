<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <title>Admin Importa Prezzi</title>

  <style>

    body{
      font-family: Arial;
      padding:40px;
      background:#f5f5f5;
    }

    h1{
      margin-bottom:40px;
    }

#importBtn{
  height:56px;
  padding:0 24px;
  border:none;
  border-radius:16px;
  background:#1f6556;
  color:white;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:
    0 4px 14px rgba(31,101,86,.25);
}

#importBtn:hover{
  transform:translateY(-2px);
  background:#2e9982;
}

#importBtn:active{
  transform:scale(.97);
}

#csvFile{
  font-size:14px;
  color:#444;
  }

#csvFile::file-selector-button{
  height:48px;
  padding:0 18px;
  margin-right:12px;
  border:none;
  border-radius:12px;
  background:#3632a8;
  color:white;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

#csvFile::file-selector-button:hover{
  background:#5853e6;
  box-shadow:
    0 4px 12px rgba(0,0,0,.15);
}


    #log{
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:8px;
      max-height:500px;
      overflow:auto;
      white-space:pre-wrap;
      font-size:14px;
    }


#importStatus{
  margin-top:20px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.progress-container{
  width:100%;
  max-width:500px;
  height:18px;
  background:#e5e5e5;
  border-radius:999px;
  overflow:hidden;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#1f6556;
  transition:width .2s ease;
}

.progress-text{
  font-size:14px;
  font-weight:600;
  color:#1f6556;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid #d9d9d9;
  border-top:3px solid #1f6556;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

    
  </style>
</head>

<body>

<h1>Importa Prezzi Configuratore KiTho</h1>

<input type="file" id="csvFile" accept=".csv" />

<br><br>

<button id="importBtn">
  IMPORTA CSV
</button>

<div id="importStatus"></div>
  
<div id="log"></div>

<script type="module">

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { db } from "./firebase.js";

async function clearPricingRules(){

  setImportStatus(
  "Eliminazione vecchie regole...",
  true
);
  
  writeLog("Eliminazione vecchie regole...");

  const snapshot =
    await getDocs(
      collection(db, "pricingRules")
    );

  for(const document of snapshot.docs){

    await deleteDoc(
      doc(db, "pricingRules", document.id)
    );

  }

  writeLog("Vecchie regole eliminate");

}

  
const importBtn =
  document.getElementById("importBtn");

const log =
  document.getElementById("log");

function writeLog(text){

  log.innerHTML += text + "\\n";

}

function parseCSV(text){

  const cleanText =
    text.replace(/\r/g, "");

  const lines =
    cleanText
      .split("\n")
      .filter(line => line.trim() !== "");

  if(lines.length < 2){

    console.log("CSV VUOTO");
    return [];

  }

  const headers =
    lines[0]
      .split(";")
      .map(h => h.trim());

  console.log("HEADERS:", headers);

  const rows = [];

  for(let i = 1; i < lines.length; i++){

    const values =
      lines[i]
        .split(";")
        .map(v => v.trim());

    console.log("VALUES:", values);

    const obj = {};

    headers.forEach((header,index)=>{

      obj[header] =
        values[index] || "";

    });

    rows.push(obj);

  }

  return rows;

}


function setImportStatus(message, loading = false){

  const box =
    document.getElementById("importStatus");

  box.style.display = "flex";
  box.style.alignItems = "center";
  box.style.gap = "12px";

  if(loading){

    box.innerHTML = `
      <span class="spinner"></span>
      <span>${message}</span>
    `;

  } else {

    box.innerHTML = `
      <span>${message}</span>
    `;

  }

}

function setProgress(current,total){

  const percent =
    Math.round((current / total) * 100);

  const box =
    document.getElementById("importStatus");

  box.style.display = "flex";

  box.innerHTML = `
    <div class="progress-text">
      Importazione ${current} / ${total}
      (${percent}%)
    </div>

    <div class="progress-container">
      <div
        class="progress-bar"
        style="width:${percent}%"
      ></div>
    </div>
  `;
}
  
importBtn.addEventListener("click", async ()=>{

  const fileInput =
    document.getElementById("csvFile");

  const file =
    fileInput.files[0];

  if(!file){

    alert("Seleziona un CSV");

    return;
  }
await clearPricingRules();

console.log("SPINNER ATTIVO");

  setImportStatus(
  "Importazione CSV in corso...",
  true
);
  
  const text =
    await file.text();

  const rows =
    parseCSV(text);

  setProgress(0, rows.length);

  writeLog(`Trovate ${rows.length} righe`);

  let imported = 0;

  for(const row of rows){

    try{

      const data = {

        articolo:
          row.articolo || "",

        taglia:
          row.taglia || "",

        altezza:
          row.altezza || "",

        spessore:
          row.spessore || "",

        pelle:
          row.pelle || "",

        foglie:
          Number(row.foglie || 0),

        cristalli:
          Number(row.cristalli || 0),

        caramella:
          row.caramella || "",

        prezzo:
          Number(
            String(row.prezzo || "0")
              .replace(",", ".")
          )

      };

      await addDoc(
        collection(db, "pricingRules"),
        data
      );

      imported++;

    setProgress(imported, rows.length);
      
      writeLog(
        `✔ IMPORTATA: ${data.articolo} / ${data.taglia}`
      );

    } catch(error){

      console.error(error);

      writeLog(
        `❌ ERRORE RIGA`
      );

    }

  }

  writeLog("");
  writeLog(`IMPORT COMPLETATO`);
  writeLog(`Totale importate: ${imported}`);

  document.getElementById(
  "importStatus"
).innerHTML = `
  <div class="progress-text">
    ✅ Import completato
    (${rows.length} regole)
  </div>
`;

  
});



  
</script>

</body>
</html>
