<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Dashboard Ordini</title>

  <link rel="stylesheet" href="style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

</head>

<body>
  
  <div class="admin-logo">

  <img
    src="logo.png"
    alt="Kitho"
  >

</div>

  
  <div class="admin-container">

    <h1 class="admin-title">
      Dashboard Ordini
    </h1>

    <div class="stats-grid">

  <div class="stat-card">

    <div class="stat-label">
      Totale ordini
    </div>

    <div
      class="stat-value"
      id="totalOrders"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      Nuovi
    </div>

    <div
      class="stat-value orange"
      id="newOrders"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      In lavorazione
    </div>

    <div
      class="stat-value blue"
      id="progressOrders"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      Completati
    </div>

    <div
      class="stat-value green"
      id="completedOrders"
    >
      0
    </div>

  </div>

<div class="stat-card">
  <div class="stat-label">
    Spediti
  </div>

  <div
    class="stat-value purple"
    id="shippedOrders"
  >
    0
  </div>
</div>

      


      
</div>

    <div class="admin-controls">

  <input
    type="text"
    id="searchOrders"
    placeholder="Cerca ordine, cliente, telefono..."
  />

  <select id="statusFilter">

    <option value="Tutti">
      Tutti gli stati
    </option>

    <option value="Nuovo">
      Nuovo
    </option>

    <option value="In lavorazione">
      In lavorazione
    </option>

    <option value="Completato">
      Completato
    </option>

    <option value="Spedito">
      Spedito
    </option>

  </select>

</div>

    



    
    <div id="ordersList"></div>

<div id="ordersList"></div>

</div>

<div id="imageModal" class="image-modal">

  <img id="modalImage" />

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
