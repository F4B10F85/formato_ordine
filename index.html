<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Configuratore Ordini</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="page-container">

    <h1 class="page-title">
      Configuratore Ordine Cliente
    </h1>

    <div class="table-scroll">
      
    <!-- HEADER COLONNE -->

    <div class="table-header">

      <div>Articolo</div>
      <div>Immagine</div>
      <div>Taglia / Lunghezza</div>
      <div>Altezza Collare</div>
      <div>Spessore Guinzaglio</div>
      <div>Colore Pelle</div>
      <div>Colore Foglie</div>
      <div>Colore Cristalli</div>
      <div>Opzioni Caramella</div>
      <div>Quantità</div>
      <div>Note</div>
      <div>Azioni</div>
      

    </div>

    <!-- RIGHE ORDINE -->

    <div id="orderRows"></div>

    <!-- RIEPILOGO ORDINE -->

    <div class="summary-box">
    
      <div class="summary-title">
        Riepilogo Ordine
      </div>
    
      <div class="summary-grid">
    
        <div class="summary-card">
          <span class="summary-label">
            Righe ordine
          </span>
    
          <span
            class="summary-value"
            id="summaryRows"
          >
            0
          </span>
        </div>
    
        <div class="summary-card">
          <span class="summary-label">
            Totale pezzi
          </span>
    
          <span
            class="summary-value"
            id="summaryQuantity"
          >
            0
          </span>
        </div>
    
        <div class="summary-card">
          <span class="summary-label">
            Righe incomplete
          </span>
    
          <span
            class="summary-value warning"
            id="summaryIncomplete"
          >
            0
          </span>
        </div>
    
      </div>
    
      <div
        class="summary-products"
        id="summaryProducts"
      >
        Nessun articolo inserito
      </div>
    
    </div>
    
    
    </div>
        
    <!-- PULSANTE AGGIUNGI -->

    <div class="add-row-container">

      <button id="addRowBtn">
      
        <span class="plus-icon">+</span>
      
        <span>Aggiungi riga</span>
      
      </button>

      <button id="clearAllBtn">
      🗑 Cancella tutto
      </button>

      <button id="validateBtn">
      Verifica ordine
      </button>
    
      <button id="exportPdfBtn">
      📄 Esporta PDF
      </button>
          
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <script src="script.js"></script>

</body>

</html>
