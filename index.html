<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Configuratore Ordini</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="page-container">

    <h1 class="page-title">Configuratore Ordine Cliente</h1>

    <div class="order-grid">

      <div class="field-group">
        <label>Articolo</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Taglia / Lunghezza</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Altezza Collare</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Spessore Guinzaglio</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Colore Pelle</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Colore Foglie</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Colore Cristalli</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Opzioni Caramella</label>

        <div class="field-box">
          <select>
            <option>Seleziona</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Quantità</label>

        <div class="field-box">
          <select>
            <option>1</option>
          </select>
        </div>
      </div>

      <div class="field-group notes-group">
        <label>Note</label>

        <div class="field-box">
          <textarea placeholder="Inserisci eventuali note..."></textarea>
        </div>
      </div>

    </div>

  </div>

</body>

</html>
